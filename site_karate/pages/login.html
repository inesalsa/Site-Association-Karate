<!DOCTYPE html>

<header>
    <h1>Sport Ensemble Karate</h1>

<nav>
    <a href="../index.html">Accueil</a>
    <a href="inscriptions.html">Inscription</a>
    <a href="sondage.html">Sondage</a>
</nav>

<main class="container-form">
    <section class="form-box">
        <h2>Connexion</h2>
        <p>Heureux de vous revoir au Dojo !</p>

        <form action="#">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="votre@email.com">
            </div>
            <div class="input-group">
                <label for="mdp">Mot de passe</label>
                <input type="password" id="mdp" name="password" required>
            </div>
            <button type="submit" class="btn-martial">Se connecter</button>
        </form>

        <div class="footer-link" style="margin-top:20px; text-align:center;">
            Pas encore de compte ? <a href="inscriptions.html">Inscrivez-vous ici</a>
        </div>
    </section>
</main>

<footer>
    <p>2026 - SEK Karate</p>
</footer>
